<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade pratica 02</title>
</head>
<body>
    <script>
// Crie um arquivo JavaScript e siga os passos abaixo para praticar
// a manipulação de variáveis e a realização de operações básicas.

// Declare quatro variáveis:
// Use let para declarar duas variáveis, num1 e num2, e atribua a elas dois números à sua escolha.
// Use const para declarar duas variáveis, nome e cidade, e atribua uma string para cada uma delas
// (seu nome e a cidade onde você mora).

// 1 - Crie novas variáveis para armazenar o resultado das seguintes operações entre num1 e num2:

// Soma (soma)
// Subtração (subtracao)
// Multiplicação (multiplicacao)
// Divisão (divisao)

// 2  - Use console.log() para exibir os resultados das operações e as informações das constantes nome e cidade.

// Objetivo:
// Realizar operações básicas de soma, subtração, multiplicação e divisão.


        let num1 = 10;
        let num2 = 2;
        const nome = 'Michael';
        const cidade = 'Zurik';

        soma = num1 += num2;
        subtracao = num1 - num2;
        multiplicacao = num1 * num2;
        divisao = num1 / num2;

        console.log(`Nome: ${nome}, cidade: ${cidade}`);
        console.log(`Soma de ${num1} e ${num2} = ${soma}`);
        console.log(`Subtração de ${num1} e ${num2} = ${subtracao}`);
        console.log(`Multiplicação de ${num1} e ${num2} = ${multiplicacao}`);
        console.log(`Divisão de ${num1} e ${num2} = ${divisao}`);
    </script>
    
</body>
</html>
