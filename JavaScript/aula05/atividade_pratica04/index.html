<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atividade pratica 04</title>
</head>
<body>
    <script>
// Objetivo:
// Praticar o uso de condicionais if, else if, e else.

// Peça ao usuário que insira a idade e armazene o valor em uma variável chamada
// idade. (Você pode usar o prompt() para simular a entrada de dados no navegador).

// 1

// Se a idade for menor que 18, exiba no console: "Você é menor de idade."
// Se a idade estiver entre 18 e 65 (inclusive), exiba: "Você é um adulto."
// Se a idade for maior que 65, exiba: "Você é idoso."

// 2 Usando a estrutura if-else, faça as seguintes verificações:
        let idade = Number(prompt('Digite sua idade: '));

        if(idade < 18){
            console.log('Voçê é de menor');
        }
        else if(idade >= 18 && idade <= 65){
            console.log('Voçê é um adulto');
        }
        else{
            console.log('Voçê é um idoso');
        }

    </script>
    
</body>
</html>
