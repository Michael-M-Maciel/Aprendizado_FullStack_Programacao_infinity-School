    <script>
// Crie um arquivo JavaScript e siga os passos abaixo para praticar o uso de loops.

// Objetivo:
// Compreender e praticar o uso de loops for e while.
// 1 Usando um loop for, exiba no console todos os números de 1 a 10.

// 2 Usando um loop while, exiba no console todos os números pares de 2 a 20.

// Usando um loop for, crie uma variável chamada soma que
// acumule a soma dos números de 1 a 5 e exiba o resultado no final.


        console.log('ex01');
        for(let i = 1; i <= 10; i++){
            console.log(i);
        }


        let numero = 2;

        console.log('ex02');

        while(numero <= 20){
            if(numero % 2 == 0){
                console.log(numero)
            }numero +=1;
            
        }

        console.log('ex03');
        let soma = 0
        for(i = 1; i <= 5; i ++){
            soma += i;
            
        }console.log('o valor de soma é: ',soma);

    </script>
