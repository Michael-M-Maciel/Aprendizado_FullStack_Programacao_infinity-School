<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operadores aritmeticos</title>
</head>
<body>
    <script>  

    /*somando numeros*/
    let adicao = 10 + 10;
    console.log("soma:", adicao );

    /*subtraindo*/
    let subtracao = 10 - 10;
    console.log("subtracao:", subtracao );

    /*dividindo*/
    let divisao = 10 / 10;
    console.log("divisao:", divisao );

    /*multiplicando*/
    let multiplicacao = 10 * 10;
    console.log("multiplicacao:", multiplicacao);

    /*módulo , retorna o resto da divisão*/
    let resto = 10 % 3;
    console.log(resto);

    /*exponenciação*/
    let potencia = 2 ** 3;
    console.log(potencia);
    
    /*incrementando (++): incrementa o valor de uma variável em +1*/
    let incremento = 10;
    incremento ++;
    console.log('incrementando', incremento);

    /*decremento (--): decrementa o valor de uma variável em -1*/
    let decremento = 10;
    console.log('decremento',decremento);

    </script>
  
    
</body>
</html>
