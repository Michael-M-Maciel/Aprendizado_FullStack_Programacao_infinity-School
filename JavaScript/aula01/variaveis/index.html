<!DOCTYPE html>
<html lang="br-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aula01 - variaveis</title>
</head>
<body>
    <script>
        // const, para informacoes que nao devem ser mudadas.
        const nome_livro = 'Lord of the rings';
        

        // let para variaveis que podem ser mudadas.
        let ano_publicacao = 2024;
        let disponivel = true;
     


        // usando var para ilustrar o comportamento de escopo.
        var numerocopias = 4;

        // exibindo valores no console
        console.log('Titulo do livro', nome_livro);
        console.log('Ano publicacao', ano_publicacao);
        console.log('Disponivel', disponivel);
        console.log('Numero de copias', numerocopias);

     
    </script>
    
</body>
</html>
