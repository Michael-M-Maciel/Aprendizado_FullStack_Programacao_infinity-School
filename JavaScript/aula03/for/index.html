<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for</title>
</head>
<body>
    <script>
        /*
         Exemplo didático de laço `for`:
         - O `for` possui três partes principais entre parênteses:
           1) inicialização: `let i = 1` — cria a variável de controle e define o valor inicial;
           2) condição: `i <= 10` — enquanto for verdadeira, o laço continua;
           3) expressão final: `i++` — executada ao fim de cada iteração para atualizar o controle.
         - Dentro do bloco imprimimos o valor atual de `i` no console.
         - `for` é uma forma compacta e clara para loops com um contador conhecido.
         - Use `let` para a variável do laço para evitar poluir o escopo global.
        */

        // laço que conta de 1 a 10
        for (let i = 1; i <= 10; i++) {
            // imprime o valor de i em cada iteração
            console.log(i);
        }
    </script>
    
</body>
</html>
