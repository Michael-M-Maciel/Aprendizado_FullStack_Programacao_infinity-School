<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade pratica 04</title>
</head>
<body>
    <script>
            //         Escreva um programa que faça o seguinte:
            // Peça ao usuário para inserir um número inteiro positivo.

            // Utilize um loop while para calcular e exibir a soma de todos os
            // números inteiros de 1 até o número inserido pelo usuário.

            // Exiba o resultado em um alerta ou no console.

            // Objetivo:
            // Praticar o uso da estrutura while para iterar um número
            // específico de vezes, manipulando entradas do usuário e
            // realizando operações aritméticas simples.

            let numero = 1;
            let soma = 0;
            let num_usuario = Number(prompt('digite um numero inteiro: '));

            while(numero <= num_usuario){
                soma += numero;
                console.log(numero)   
                numero ++   
                   
                     
            }
            console.log('somando',soma);

        
            

    </script>
    
</body>
</html>
