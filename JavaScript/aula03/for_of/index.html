<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for of</title>
</head>
<body>
    <script>
        // Declarar uma variável com uma string
        let nome ='Michael';

        // Loop for...of percorre cada caractere da string
        for(let i of nome){
            // Imprime cada caractere no console
            console.log(i);
        }
    </script>
</body>
</html>
