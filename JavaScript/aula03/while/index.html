<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>While</title>
</head>
<body>
    <script>
        /*
         Exemplo didático de laço `while`:
         - Declaramos uma variável de controle (`i`) iniciando em 1.
         - Enquanto a condição `i <= 100` for verdadeira, o bloco é executado.
         - A cada iteração imprimimos o valor atual e incrementamos `i`.
         - O incremento é essencial para que o laço avance e termine (evita loop infinito).
        */

        // declara a variável de controle e inicia em 1
        let i = 1;

        // condição do laço: enquanto i for menor ou igual a 100
        while (i <= 100) {
            // imprime o valor atual de i no console do navegador
            console.log(i);

            // incrementa i em 1 (equivalente a i = i + 1)
            i++;
        }
    </script>
</body>
</html>
