<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade pratica 01</title>
</head>
<body>
                <!-- Atividade 01
            Crie um código que utilize um loop while para contar de 1 a 10
            e exibir cada número no console.

            Objetivo:
            Aprender a utilizar a estrutura de repetição while para executar
            um bloco de código repetidamente enquanto uma condição é
            verdadeira. -->
            
    <script>
        let numero = 1;

        while(numero <= 10){
            console.log(`contando, ${numero}...`);
            numero++;
        }
        console.log('fim')
    </script>
    
</body>
</html>
