    <script>
        // Crie uma função chamada saudacao que receba um parâmetro
        // nome e retorne uma string de saudação no formato "Olá, [nome]!".

        // Objetivo:
        // Praticar o uso de funções com lógica
        // condicional e manipulação de arrays.
        // Em seguida:

        // 1 Chame a função saudacao passando diferentes nomes.
        // 2 Exiba o resultado no console.

        function saudacao(nome){
            return `olá ${nome} !`;
        }

        let saudacaoTeste = saudacao(['michael', 'aline', 'marcos']);
       
        console.log(saudacaoTeste);
    


    </script>
