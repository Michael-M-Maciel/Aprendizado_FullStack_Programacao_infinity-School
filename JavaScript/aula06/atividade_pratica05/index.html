<!DOCTYPE html>

<body>
    <script>
        // Crie três funções anônimas e atribua-as a variáveis para realizar as seguintes operações matemáticas:

        // Praticar o uso de funções anônimas, atribuindo-as a
        // variáveis para realizar diferentes operações matemáticas.
        // Objetivo:

        // Em seguida:
        // Chame cada função anônima passando
        // diferentes valores e exiba o resultado
        // no console.
        // Soma: A função deve receber dois números e retornar a soma deles.
        // Subtração: A função deve receber dois números e retornar a subtração do primeiro pelo segundo.
        // Multiplicação: A função deve receber dois números e retornar o produto deles.

        let somando = function(a, b){
            return a + b;
        }
        let subtracao = function(a, b){
            return a - b;
        }
        let multi = function(a, b){
            return a * b;
        }
        

        let soma = somando(2, 2);
        console.log(soma);

        let diminuindo = subtracao(3, 2);
        console.log(diminuindo);

        let multiplicacao  = multi(2, 5);
        console.log(multiplicacao);
    </script>
    
</body>
