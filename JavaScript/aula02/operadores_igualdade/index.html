<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operadores de igualdade / comparação</title>
</head>
<body>
    <script>
        num1 = Number(prompt('digite o num1: '));
        num2 = prompt('digite o num2: ');

        console.log(num1 == num2);
        console.log(num1 === num2);
        console.log(num1 != num2);
        console.log(num1 !== num2);
        console.log(num1 < num2);
        console.log(num2 < num1);
        console.log(num1 >= num2);
        console.log(num2 >= num1);

    </script>
    
</body>
</html>
