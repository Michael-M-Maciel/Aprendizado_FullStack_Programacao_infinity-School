        let num1 = Number(prompt('digite um num1: '))
        let num2 = Number(prompt('digite um num2: '))
        let operacao = prompt('(+, -, /, *): ');
        let calculo;

        switch(operacao){
            case '+':
                calculo = num1 +=num2;
                break
            case '-':
                calculo = num1 -=num2;
                break
            case '/':
                calculo = num1 /=num2;
                break
            case '*':
                calculo = num1 *=num2;
                break
            default:
                calculo = 'calculo invalido';
        }
