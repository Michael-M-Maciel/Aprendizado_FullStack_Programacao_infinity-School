<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>condicionais ternario</title>
</head>
<body>
    <script>
        let idadae = 18;
        let status_idade = (idadae >= 18)? 'de maior' : 'de menor'; /* ternário.  variavel = condicional ? if : else*/
        console.log(status_idade);
    
    </script>
    
</body>
</html>
